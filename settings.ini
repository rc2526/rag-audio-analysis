; rag-audio-analysis shared settings
;
; How to use this file:
; 1. Edit values here instead of changing Python defaults where possible.
; 2. Keep paths absolute when they refer to the remote Yale host.
; 3. After changing retrieval or prompt settings, rerun the relevant scripts.
; 4. If you change UI-facing settings, restart Streamlit.
;
; Important:
; - This file now drives the active pipeline defaults for:
;   config.py
;   source_bridge.py
;   export_transcript_spans.py
;   run_cycle_analysis.py
;   streamlit_app.py
; - Some legacy scripts still have older code-level defaults and are not the main workflow.

[paths]
source_root = /Users/rhea.chatterjeeyale.edu/rag-audio
rag_index_subdir = rag_index
build_and_query_relpath = tools/build_and_query_rag.py
manual_relpath = manual.txt
topics_csv_relpath = manual_topics.csv
topic_list_relpath = rag_index/topic_list.json
manual_doc_indices_relpath = rag_index/manual_doc_indices.json
manual_doc_topic_map_relpath = rag_index/manual_doc_topic_map.json
meta_relpath = rag_index/meta.json
transcripts_glob = audio/de-identified_transcripts/**/*.txt

[manual_parsing]
max_words_per_unit = 220

[topic_matching]
topic_min_similarity = 0.30
topic_high_similarity = 0.55
topic_medium_similarity = 0.42
manual_unit_min_similarity = 0.28

[transcript_export]
topic_query_topk = 120
topic_query_weight_doc = 0.3
topic_query_weight_topic = 0.7
context_window = 2
confidence_rank_high = 10
confidence_rank_medium = 30
confidence_score_high = 1.5
confidence_score_medium = 0.5

[cycle_analysis]
cycles = 1,2,3,4,5,6,7,8
fidelity_topk = 12
question_topk = 8
fidelity_weight_doc = 1.0
fidelity_weight_topic = 0.0
question_weight_doc = 1.0
question_weight_topic = 0.0
limit_topics = 0

[fidelity]
fidelity_query_template = Session {session_num} {topic_label}
manual_coverage_weight = 0.6
subsection_coverage_weight = 0.4
adherence_high_cutoff = 0.66
adherence_moderate_cutoff = 0.33

[pi_questions]
facilitator_reference_label = How often do facilitators refer to this topic?
facilitator_reference_query = Session {session_num} {topic_label}. Facilitator introducing, teaching, reviewing, or cueing this topic.
facilitator_demonstration_label = How do facilitators demonstrate this skill?
facilitator_demonstration_query = Session {session_num} {topic_label}. Facilitator modeling, guiding, demonstrating, or leading practice of this skill.
participant_practice_label = How do participants practice this skill in the session or individually at home?
participant_practice_query = Session {session_num} {topic_label}. Participant describing practicing this skill in session or individually at home.
participant_child_home_label = What do participants share about practicing this skill with their child at home?
participant_child_home_query = Session {session_num} {topic_label}. Participant describing using this skill with their child at home.

[prompting]
manual_units_in_prompt = 6
manual_excerpt_chars = 220
evidence_excerpt_chars = 400
display_excerpt_chars = 500
ui_excerpt_chars = 280

[ollama]
default_model = gpt-oss:120b
ssh_host = rc2526@10.168.224.148
ssh_key = ~/.ssh/ollama_remote
remote_bin = /usr/local/bin/ollama

[ui]
app_title = rag-audio-analysis
app_caption = Cycle-by-cycle session-topic evidence analysis built from retrieved transcript evidence, manual units, and PI-question summaries.
cycle_prefix = PMHCycle
streamlit_port = 8501

[chat]
topk = 8
weight_doc = 1.0
weight_topic = 0.0
include_manual = false
answer_with_model = true

[topk_window_manual_heatmap]
; Interactive sparse heatmap view: transcript windows (rows) vs structured manual units (columns).
; Run with: streamlit run app/streamlit_topk_window_manual_heatmap.py
caption = Interactive QA view: top-k matches against transcript windows.

; Candidate transcript window selection mode (supported: cycle_only)
selection_mode = cycle_only

; Manual unit axis scope:
; - session (recommended)
; - global
manual_scope = session

; Default UI filters (empty = no filter).
default_cycle_id =
default_session_num =
default_topic_id =

; Window construction / sampling.
; If omitted, the app falls back to [transcript_export].context_window.
context_window = 2
max_windows = 0
random_sample = false
sample_seed = 0

; Matching / display parameters.
topk = 20
max_window_chars = 0
min_score = -1.0
manual_unit_prefix_template = Session {session_num} 
color_scale = Viridis
plot_height = 650
marker_size = 10
